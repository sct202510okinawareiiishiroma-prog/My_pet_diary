<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<title>ログイン - MyPetDiary</title>
	<link rel="stylesheet" th:href="@{/css/common.css}">
	<link rel="stylesheet" th:href="@{/css/auth.css}">

	<script th:src="@{/js/auth.js}" defer></script>

</head>

<body>
	<div class="container" style="text-align: center;">
		<h1>MyPetDiary ログイン</h1>

		<div th:if="${param.error}" style="color: red; margin-bottom: 15px;">ユーザーIDまたはパスワードが正しくありません。</div>
		<div th:if="${param.logout}" style="color: blue; margin-bottom: 15px;">ログアウトしました。</div>
		<div th:if="${param.register_success}" style="color: green; margin-bottom: 15px;">登録完了！ログインしてください。</div>

		<form th:action="@{/login}" method="post">
			<div class="auth-form-group">
				<label for="username">ユーザーID:</label>
				<input type="text" id="username" name="username" required autofocus class="auth-input">
			</div>

			<div class="auth-form-group">
				<label for="password">パスワード:</label>
				<div class="password-wrapper">
					<input type="password" id="password" name="password" required class="auth-input password-input">
					<span id="togglePassword" class="password-toggle">
					🙈
					</span>
				</div>
			</div>

			<button type="submit" class="btn" style="max-width: 400px; width: 100%;">ログイン</button>
		</form>

		<hr>
		<p>アカウントをお持ちでない方は <a th:href="@{/register}">新規登録</a></p>
	</div>

</body>

</html>
