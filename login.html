<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>ログイン - MyPetDiary</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .login-form-group { max-width: 400px; margin: 0 auto 15px auto; text-align: left; }
        .login-input { width: 100%; padding: 8px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
        .password-wrapper { position: relative; display: flex; align-items: center; width: 100%; }
    </style>
</head>
<body>
    <div class="container" style="text-align: center;">
        <h1>MyPetDiary ログイン</h1>

        <div th:if="${param.error}" style="color: red; margin-bottom: 15px;">ユーザーIDまたはパスワードが正しくありません。</div>
        <div th:if="${param.logout}" style="color: blue; margin-bottom: 15px;">ログアウトしました。</div>
        <div th:if="${param.register_success}" style="color: green; margin-bottom: 15px;">登録完了！ログインしてください。</div>

        <form th:action="@{/login}" method="post">
            <div class="login-form-group">
                <label for="username">ユーザーID:</label>
                <input type="text" id="username" name="username" required autofocus class="login-input">
            </div>

            <div class="login-form-group">
                <label for="password">パスワード:</label>
                <div class="password-wrapper">
                    <input type="password" id="password" name="password" required class="login-input" style="padding-right: 45px;">
                    <span id="togglePassword" style="position: absolute; right: 10px; cursor: pointer; font-size: 1.2em;">🙈</span>
                </div>
            </div>

            <button type="submit" class="btn" style="max-width: 400px; width: 100%;">ログイン</button>
        </form>

        <hr>
        <p>アカウントをお持ちでない方は <a th:href="@{/register}">新規登録</a></p>
    </div>

    <script>
        const togglePassword = document.querySelector('#togglePassword');
        const passwordInput = document.querySelector('#password');
        togglePassword.addEventListener('click', function () {
            const isPassword = passwordInput.getAttribute('type') === 'password';
            passwordInput.setAttribute('type', isPassword ? 'text' : 'password');
            this.textContent = isPassword ? '🐵' : '🙈';
        });
    </script>
</body>
</html>
