<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<title>MyPetDiary - メイン画面</title>
	<link rel="stylesheet" th:href="@{/css/main.css}">
	<link rel="stylesheet" th:href="@{/css/common.css}">
	<script th:src="@{/js/weather.js}" defer></script>
	<script th:src="@{/js/custom-item-modal.js}" defer></script>
	<script th:src="@{/js/validation.js}" defer></script>
	<script th:src="@{/js/filter.js}"></script>
</head>

<body>
	<div class="container">
		<header class="main-header">
			<h1>MyPetDiary</h1>
			<form th:action="@{/logout}" method="post">
				<button type="submit" class="btn-logout">ログアウト</button>
			</form>
		</header>

		<p>こんにちは、<strong th:text="${#authentication.name}">ユーザー</strong>さん</p>

		<div class="photo-display-area">
			<div th:if="${user != null and user.favoritePhoto != null}">
				<img th:src="@{'/images/' + ${user.favoritePhoto}}" alt="お気に入り写真" class="pet-photo">
			</div>
			<div th:if="${user == null or user.favoritePhoto == null}" class="no-photo-placeholder">
				<p>写真が未登録です</p>
			</div>

			<div class="photo-upload-controls">
				<form th:action="@{/uploadPhoto}" method="post" enctype="multipart/form-data">
					<label for="photo-input" class="btn-paw">
						<span class="paw-icon">🐾</span>
						<span>お気に入り写真を変更</span>
					</label>
					<input type="file" id="photo-input" name="photo" accept="image/*" onchange="this.form.submit()"
						style="display: none;">
				</form>
			</div>
		</div>

		<section class="weather-area">
			<h2>地域のお天気情報を確認</h2>
			<select id="region-select" class="diary-input" onchange="updateWeatherPreview()">
				<option value="">地域を選択してください</option>
				<option value="35.6895,139.6917">東京</option>
				<option value="34.6937,135.5023">大阪</option>
				<option value="43.0642,141.3468">札幌</option>
				<option value="33.5902,130.4017">福岡</option>
				<option value="26.2124,127.6809">那覇</option>
			</select>
			<div id="weather-preview" class="weather-preview">--</div>
			<button type="button" class="btn btn-weather-apply" onclick="applyWeatherToFields()">天気を入力欄にコピー</button>
		</section>

		<section class="form-section">
			<h2 th:if="${editingRecord?.id != null} ? '記録を編集する' : '今日の記録をつける'">今日の記録をつける</h2>
			<form th:action="@{/save}" th:object="${editingRecord}" method="post">
				<input type="hidden" th:field="*{id}">

				<div class="form-group">
					<label>体重 (kg):</label>
					<input type="number" step="0.01" th:field="*{weight}" class="diary-input" inputmode="decimal">
				</div>

				<div class="form-group">
					<label>気温 (°C):</label>
					<input type="number" step="0.1" id="temp-input" th:field="*{temperature}" class="diary-input"
						inputmode="decimal">
				</div>

				<div class="form-group">
					<label>湿度 (%):</label>
					<input type="number" id="humi-input" th:field="*{humidity}" class="diary-input" inputmode="decimal">
				</div>

				<div class="form-group">
					<label>ごはん (g):</label>
					<input type="number" step="0.1" th:field="*{food}" class="diary-input" inputmode="decimal">
				</div>

				<div th:each="item : ${customItems}" class="form-group">
					<label th:text="${item.itemName} + ( ${item.calcType == 'SUM'} ? ' (計)' : ' (最新)' ) + ':'"
						class="clickable-item-name" th:onclick="openEditModal([[${item.id}]], [[${item.itemName}]])"
						style="display: inline-block; margin-bottom: 5px;">
					</label>

					<input type="number" step="0.1" th:name="'customItem_' + ${item.id}" class="diary-input"
						th:placeholder="${item.itemName} + 'を入力'">
				</div>

				<div class="form-group">
					<label>メモ:</label>
					<textarea th:field="*{memo}" rows="3" placeholder="体調や様子など" class="diary-input"></textarea>
				</div>

				<button type="submit" class="btn" th:text="${editingRecord?.id != null} ? '更新する' : '保存する'">保存する</button>
				<a th:if="${editingRecord?.id != null}" th:href="@{/}" class="link-cancel">キャンセル</a>
			</form>
		</section>

		<div class="custom-item-add-area">
			<button type="button" class="btn-paw" onclick="openModal()">
				<span>🐾 項目を追加・管理</span>
			</button>
			<div class="current-custom-items">
				<span th:each="item : ${customItems}" class="custom-item-tag" th:text="${item.itemName}"
					th:onclick="'openEditModal(' + ${item.id} + ', \'' + ${item.itemName} + '\')'">
				</span>
			</div>
		</div>

		<dialog id="customItemModal">
			<div class="modal-content">
				<span class="close" onclick="document.getElementById('customItemModal').close()">&times;</span>
				<h3 id="modalTitle">項目の追加</h3>
				<form id="customItemForm" method="post">
					<input type="hidden" id="itemId" name="id">
					<div class="form-group">
						<label for="itemNameInput">項目名</label>
						<input type="text" id="itemNameInput" name="itemName" required placeholder="例：お散歩">
					</div>
					<div id="calcTypeArea" class="form-group">
						<label>集計方法</label>
						<div class="radio-group">
							<label><input type="radio" name="calcType" value="SUM" checked> 合計</label>
							<label><input type="radio" name="calcType" value="LATEST"> 最新値</label>
						</div>
					</div>
					<div class="modal-buttons">
						<button type="submit" class="btn-save">保存</button>
						<button type="button" id="deleteButton" class="btn-delete-modal"
							onclick="handleDelete()">削除</button>
					</div>
				</form>
			</div>
		</dialog>

		<h2>これまでの記録</h2>

		<div class="filter-section">
			<button type="button" class="btn-filter-toggle" id="filterToggle">
				<span id="currentModeText">
					絞り込み：<span th:text="${currentMode == 'day' ? '今日' : 
                                   currentMode == 'week' ? '最近1週間' : 
                                   currentMode == 'month' ? '今月' : 
                                   currentMode == 'year' ? '今年' : '全期間'}">今日</span>
				</span>
				<span class="arrow-icon">▼</span>
			</button>
			<div class="filter-options" id="filterOptions">
				<a th:href="@{/(mode='day')}" class="filter-btn"
					th:classappend="${currentMode == 'day'} ? 'active'">今日</a>
				<a th:href="@{/(mode='week')}" class="filter-btn"
					th:classappend="${currentMode == 'week'} ? 'active'">最近1週間</a>
				<a th:href="@{/(mode='month')}" class="filter-btn"
					th:classappend="${currentMode == 'month'} ? 'active'">今月</a>
				<a th:href="@{/(mode='year')}" class="filter-btn"
					th:classappend="${currentMode == 'year'} ? 'active'">今年</a>
				<a th:href="@{/(mode='all')}" class="filter-btn"
					th:classappend="${currentMode == 'all'} ? 'active'">全期間</a>
			</div>
		</div>

		<table class="record-table">
			<thead>
				<tr>
					<th>日付</th>
					<th>体重</th>
					<th>気温</th>
					<th>湿度</th>
					<th>ごはん</th>
					<th th:each="item : ${customItems}" th:text="${item.itemName}"></th>
					<th>メモ</th>
					<th>操作</th>
				</tr>
			</thead>
			<tbody>
				<tr th:each="r : ${records}">
					<td th:text="${r[0]}"></td>
					<td th:text="${r[1] != null ? r[1] + 'kg' : '-'}"></td>
					<td th:text="${r[2] != null ? r[2] + '°C' : '-'}"></td>
					<td th:text="${r[3] != null ? r[3] + '%' : '-'}"></td>
					<td th:text="${r[4] != null ? r[4] + 'g' : '0g'}"></td>
					<td th:each="item : ${customItems}">
						<span th:each="pair : ${#strings.arraySplit(r[5], ',')}"
							th:if="${r[5] != null and #strings.arraySplit(pair, ':')[0] == #strings.toString(item.id)}"
							th:text="${#strings.arraySplit(pair, ':')[1]}">
						</span>
					</td>

					<td>
						<details th:if="${r[6] != null and !#strings.isEmpty(r[6])}">
							<summary style="cursor: pointer; list-style: none;">
								<span class="memo-toggle-icon">💬 メモを見る</span>
							</summary>
							<div class="memo-content" th:text="${r[6]}"></div>
						</details>
					</td>
					<td>
						<div class="action-buttons">
							<a th:href="@{/edit/{id}(id=${r[7]})}" class="btn-edit">編集</a>
							<form th:action="@{/delete/{id}(id=${r[7]})}" method="post" style="display:inline;">
								<button type="submit" class="btn-delete" onclick="return confirm('削除しますか？')">削除</button>
							</form>
						</div>
					</td>
				</tr>
			</tbody>
		</table>
	</div>
</body>

</html>
