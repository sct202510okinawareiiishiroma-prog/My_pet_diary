<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<title>MyPetDiary</title>
	<style>
		/* --- デザイン設定 --- */
		body {
			font-family: 'Hiragino Kaku Gothic ProN', sans-serif;
			background-color: rgb(216, 167, 167); /* 優しいピンクベージュ */
			color: #5d4037;
			padding: 20px;
		}

		.container {
			max-width: 800px;
			margin: auto;
			background: white;
			padding: 20px;
			border-radius: 15px;
			box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
		}

		.form-group {
			margin-bottom: 15px;
		}

		label {
			display: block;
			margin-bottom: 5px;
			font-weight: bold;
		}

		input {
			width: 100%;
			padding: 8px;
			box-sizing: border-box;
			border: 1px solid #ccc;
			border-radius: 4px;
		}

		button {
			width: 100%;
			padding: 10px;
			background-color: #ffb74d; /* やさしいオレンジ色 */
			border: none;
			border-radius: 5px;
			color: white;
			font-weight: bold;
			cursor: pointer;
		}

		button:hover {
			background-color: #ffa726;
		}

		/* お天気情報エリアのスタイル */
		.weather-box {
			background: #f0f7ff;
			padding: 15px;
			border-radius: 10px;
			margin-bottom: 20px;
			border: 1px solid #d0e2ff;
			display: flex;
			align-items: center;
			justify-content: space-between;
		}

		.weather-info {
			font-size: 0.95em;
		}

		.apply-btn {
			width: auto;
			padding: 5px 15px;
			font-size: 0.85em;
			background-color: #64b5f6;
		}

		hr {
			border: 0;
			border-top: 1px dashed #d8a7a7;
			margin: 30px 0;
		}

		table {
			width: 100%;
			border-collapse: collapse;
			margin-top: 10px;
		}

		th, td {
			padding: 12px;
			text-align: left;
			border-bottom: 1px solid #eee;
		}

		th {
			background-color: #fff3e0;
			color: #e65100;
		}

		.alert-text {
			color: #d32f2f;
			font-weight: bold;
		}
		
		.edit-btn {
			color: #ffa726;
			text-decoration: none;
			font-weight: bold;
			margin-right: 10px;
		}

		.delete-btn {
			color: #d32f2f;
			text-decoration: none;
			font-weight: bold;
		}
	</style>
</head>

<body>

	<div class="container">
		<h1>🐾 MyPetDiary</h1>

		<form th:action="@{/save}" method="post">
			<input type="hidden" name="id" th:value="${editingRecord.id}">

			<div class="weather-box" th:if="${currentWeather != null}">
				<div class="weather-info">
					📍 <strong>現在の那覇市:</strong> 
					気温 <span id="api-temp" th:text="${currentWeather.temperature_2m}">--</span>℃ / 
					湿度 <span id="api-humidity" th:text="${currentWeather.relative_humidity_2m}">--</span>%
				</div>
				<button type="button" class="apply-btn" onclick="applyWeather()">📋 コピー</button>
				</button>
			</div>

			<div class="form-group">
				<label>📅 記録日時</label>
				<input type="datetime-local" name="customTimestamp" th:value="${editingRecord.createdAt}">
				<small style="color: #888;">※空欄にすると「今」の時刻で保存されます</small>
			</div>
			
			<div class="form-group">
				<label>🌡️ 気温 (℃)</label>
				<input type="number" id="input-temp" name="temperature" step="0.1" required th:value="${editingRecord.temperature}">
			</div>

			<div class="form-group">
				<label>💧 湿度 (%)</label>
				<input type="number" id="input-humidity" name="humidity" required th:value="${editingRecord.humidity}">
			</div>

			<div class="form-group">
				<label>⚖️ ペットの体重 (kg)</label>
				<input type="number" name="weight" step="0.01" required th:value="${editingRecord.weight}">
			</div>

			<div class="form-group">
				<label>📋 メモ</label>
				<input type="text" name="memo" th:value="${editingRecord.memo}">
			</div>

			<button type="submit" th:text="${editingRecord.id != null} ? '更新する' : '記録する'"></button>
			
			<div th:if="${editingRecord.id != null}" style="text-align: center; margin-top: 10px;">
				<a th:href="@{/}" style="color: #888; text-decoration: none;">キャンセル</a>
			</div>
		</form>

		<hr>

		<h2>📋 過去の記録</h2>
		<table>
			<thead>
				<tr>
					<th>日時</th>
					<th>気温</th>
					<th>湿度</th>
					<th>体重</th>
					<th>メモ</th>
					<th>操作</th>
				</tr>
			</thead>
			<tbody>
				<tr th:each="record : ${records}">
					<td th:text="${#temporals.format(record.createdAt, 'yyyy/MM/dd HH:mm')}"></td>
					<td th:text="${record.temperature} + ' ℃'"></td>
					<td th:text="${record.humidity} + ' %'"></td>
					<td th:text="${record.weight} + ' kg'" 
					    th:classappend="${record.weight > 10.0} ? 'alert-text' : ''"></td>
					<td th:text="${record.memo}"></td>
					<td>
						<a class="edit-btn" th:href="@{/edit/{id}(id=${record.id})}">✏️ 編集</a>
						<a class="delete-btn" th:href="@{/delete/{id}(id=${record.id})}"
						   onclick="return confirm('この記録を削除してもよろしいですか？');">
						   🗑️ 削除
						</a>
					</td>
				</tr>
			</tbody>
		</table>
	</div>
	
	
	<script>
		function applyWeather() {
			document.getElementById('input-temp').value = document.getElementById('api-temp').innerText;
			document.getElementById('input-humidity').value = document.getElementById('api-humidity').innerText;
		}
	</script>

</body>
</html>
