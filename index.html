<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<title>MyPetDiary - メイン画面</title>
	<link rel="stylesheet" th:href="@{/css/main.css}">
	<link rel="stylesheet" th:href="@{/css/common.css}">
	<script th:src="@{/js/weather.js}" defer></script>
</head>

<body>
	<div class="container">
		<header class="main-header">
			<h1>MyPetDiary</h1>
			<form th:action="@{/logout}" method="post">
				<button type="submit" class="btn-logout">ログアウト</button>
			</form>
		</header>

		<p>こんにちは、<strong th:text="${#authentication.name}">ユーザー</strong>さん</p>

		<div class="photo-display-area">
			<div th:if="${user != null and user.favoritePhoto != null}">
				<img th:src="@{'/images/' + ${user.favoritePhoto}}" alt="お気に入り写真" class="pet-photo">
			</div>
			<div th:if="${user == null or user.favoritePhoto == null}" class="no-photo-placeholder">
				<p>写真が未登録です</p>
			</div>

			<div class="photo-upload-controls">
				<form th:action="@{/uploadPhoto}" method="post" enctype="multipart/form-data">
					<label for="photo-input" class="btn-paw">
						<span class="paw-icon">
						🐾
						</span> 写真を変更
						<input type="file" id="photo-input" name="photo" accept="image/*" onchange="this.form.submit()"
							style="display: none;">
					</label>
				</form>
			</div>
		</div>




		<div class="weather-area">
			<label for="region-select"><strong>地域を選択:</strong></label>
			<select id="region-select" class="region-select-box">
				<option value="26.21,127.68">沖縄県（那覇）</option>
				<option value="35.68,139.76">東京都（千代田区）</option>
				<option value="34.69,135.50">大阪府（大阪）</option>
				<option value="43.06,141.35">北海道（札幌）</option>
				<option value="33.59,130.40">福岡県（福岡）</option>
			</select>
			<button type="button" class="btn btn-weather-apply" onclick="applyRegionalWeather()">天気を入力欄にコピー</button>
			<span id="weather-preview" class="weather-preview"></span>
		</div>

		<hr>

		<section class="post-section">
			<h2 th:text="${editingRecord.id != null} ? '記録を編集する' : '今日の記録をつける'">今日の記録をつける</h2>

			<form th:action="@{/save}" method="post" th:object="${editingRecord}">
				<input type="hidden" th:field="*{id}">

				<div class="form-group">
					<label>体重 (kg):</label>
					<input type="number" step="0.1" th:field="*{weight}" required class="diary-input">
				</div>

				<div class="form-group">
					<label>気温 (°C):</label>
					<input type="number" step="0.1" id="temp-input" th:field="*{temperature}" class="diary-input">
				</div>

				<div class="form-group">
					<label>湿度 (%):</label>
					<input type="number" id="humi-input" th:field="*{humidity}" class="diary-input">
				</div>

				<div class="form-group">
					<label>メモ:</label>
					<textarea th:field="*{memo}" rows="3" placeholder="体調や様子など" class="diary-input"></textarea>
				</div>

				<button type="submit" class="btn" th:text="${editingRecord.id != null} ? '更新する' : '保存する'">保存する</button>
				<a th:if="${editingRecord.id != null}" th:href="@{/}" class="link-cancel">キャンセル</a>
			</form>
		</section>

		<hr>

		<section class="list-section">
			<h2>これまでの記録</h2>
			<table class="diary-table">
				<thead>
					<tr>
						<th>日時</th>
						<th>体重</th>
						<th>気温</th>
						<th>湿度</th>
						<th>メモ</th>
						<th>操作</th>
					</tr>
				</thead>
				<tbody>
					<tr th:each="r : ${records}">
						<td th:text="${#temporals.format(r.createdAt, 'yyyy/MM/dd HH:mm')}"></td>
						<td th:text="${r.weight} + 'kg'"></td>
						<td th:text="${r.temperature != null ? r.temperature + '°C' : '-'}"></td>
						<td th:text="${r.humidity != null ? r.humidity + '%' : '-'}"></td>
						<td th:text="${r.memo}"></td>
						<td>
							<a th:href="@{/edit/{id}(id=${r.id})}">編集</a> |
							<a th:href="@{/delete/{id}(id=${r.id})}" onclick="return confirm('本当に削除してもよろしいですか？')"
								class="link-delete">削除</a>
						</td>
					</tr>
				</tbody>
			</table>
		</section>
	</div>
</body>

</html>
